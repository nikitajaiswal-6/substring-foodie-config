spring:
  datasource:
    url: jdbc:mysql://localhost:3306/micros_db
    username: N_Spark
    password: Spark
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true


management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

#Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone : "http://localhost:8761/eureka/"